[tools]
node = "latest"
pnpm = "latest"

[hooks]
# Enabling corepack will install the `pnpm` package manager specified in your package.json
# alternatively, you can also install `pnpm` with mise
postinstall = "npx corepack enable"

[settings]
# This must be enabled to make the hooks work
experimental = true

[env]
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install dependencies (dev via pnpm)"
run = "pnpm install"
sources = ["package.json", "pnpm-lock.yaml", "mise.toml"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks.build]
description = "Build grammar + bundle"
run = "pnpm run build"
depends = ["install"]

[tasks.dev]
description = "Watch/bundle for development"
run = "pnpm run dev"
depends = ["install"]

[tasks.test]
description = "Run test suite"
run = "pnpm test"
depends = ["install"]

[tasks.clean]
description = "Clean build artifacts"
run = "pnpm run clean"

# Packaging uses npm to avoid npm list issues with pnpm layout.
[tasks.package]
description = "Create VSIX (clean npm install)"
run = """
set -euo pipefail
tmp=$(mktemp -d)
trap 'rm -rf "$tmp"' EXIT
git archive --format=tar HEAD | tar -C "$tmp" -x
cd "$tmp"
npm install
npm run build
npx @vscode/vsce package
cp ./*.vsix "$OLDPWD"/
"""
depends = ["clean"]

[tasks.publish]
description = "Publish extension (clean npm install)"
run = """
set -euo pipefail
tmp=$(mktemp -d)
trap 'rm -rf "$tmp"' EXIT
git archive --format=tar HEAD | tar -C "$tmp" -x
cd "$tmp"
npm install
npm run build
npx @vscode/vsce publish
"""
depends = ["clean"]
