[tools]
node = "latest"
pnpm = "latest"

[hooks]
# Enabling corepack will install the `pnpm` package manager specified in your package.json
# alternatively, you can also install `pnpm` with mise
postinstall = "npx corepack enable"

[settings]
# This must be enabled to make the hooks work
experimental = true

[env]
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install dependencies (dev via pnpm)"
run = "pnpm install"
sources = ["package.json", "pnpm-lock.yaml", "mise.toml"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks.build]
description = "Build grammar + bundle"
run = "pnpm run build"
depends = ["install"]

[tasks.dev]
description = "Watch/bundle for development"
run = "pnpm run dev"
depends = ["install"]

[tasks.test]
description = "Run test suite"
run = "pnpm test"
depends = ["install"]

[tasks.clean]
description = "Clean build artifacts"
run = "pnpm run clean"

# Packaging delegates to the pnpm scripts in package.json (single source of truth).
# Those do a clean frozen install, build, smoke gate, then vsce --no-dependencies.
[tasks.package]
description = "Create VSIX (clean pnpm install + smoke gate)"
run = "pnpm run package"
depends = ["clean"]

[tasks.publish]
description = "Publish extension (clean pnpm install + smoke gate)"
run = "pnpm run publish"
depends = ["clean"]
